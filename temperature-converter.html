<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter | Zaculators</title>
    <style>
        :root { --primary:#2563eb; --bg:#f8fafc; --text:#0f172a; --border:#e2e8f0; --success:#16a34a; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
        header, footer { background:#fff; text-align:center; padding:1.5rem; }
        header { border-bottom:1px solid var(--border); }
        footer { border-top:1px solid var(--border); color:#64748b; margin-top:3rem; }
        main { max-width:920px; margin:0 auto; padding:2rem; }
        .panel { background:#fff; border:1px solid var(--border); border-radius:12px; padding:2rem; }
        .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; }
        .full { grid-column:1 / -1; }
        label { display:block; font-weight:600; margin-bottom:0.5rem; }
        input, select, button { width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:8px; font:inherit; }
        input:focus, select:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
        button { background:var(--primary); border:none; color:#fff; font-weight:600; cursor:pointer; }
        h1 { font-size:1.8rem; margin-bottom:0.25rem; }
        .subtle { color:#64748b; }
        .result { display:none; margin-top:1.5rem; padding:1.25rem; border-left:4px solid var(--success); background:#f0fdf4; border-radius:8px; }
        .result.active { display:block; }
        .value { font-size:1.6rem; font-weight:700; color:var(--success); }
        a { color:var(--primary); text-decoration:none; }
        a:hover { text-decoration:underline; }
        @media (max-width:680px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>Temperature Converter</h1>
        <p class="subtle"><a href="index.html">Zaculators</a> / Utilities &amp; Converters</p>
    </header>
    <main>
        <section class="panel">
            <form id="temp-form" class="grid">
                <div class="full">
                    <label for="inputValue">Temperature</label>
                    <input type="number" id="inputValue" step="any" placeholder="72" required>
                </div>
                <div>
                    <label for="fromUnit">From</label>
                    <select id="fromUnit">
                        <option value="c">Celsius</option>
                        <option value="f">Fahrenheit</option>
                        <option value="k">Kelvin</option>
                    </select>
                </div>
                <div>
                    <label for="toUnit">To</label>
                    <select id="toUnit">
                        <option value="f">Fahrenheit</option>
                        <option value="c">Celsius</option>
                        <option value="k">Kelvin</option>
                    </select>
                </div>
                <div class="full">
                    <button type="submit">Convert</button>
                </div>
            </form>
            <div id="result" class="result">
                <div id="value" class="value"></div>
            </div>
        </section>
    </main>
    <footer><p><strong>Zaculators</strong> &copy; 2026</p></footer>
    <script>
        function toCelsius(value, unit) {
            if (unit === "c") return value;
            if (unit === "f") return (value - 32) * 5 / 9;
            return value - 273.15;
        }
        function fromCelsius(value, unit) {
            if (unit === "c") return value;
            if (unit === "f") return (value * 9 / 5) + 32;
            return value + 273.15;
        }
        const labels = { c: "Celsius", f: "Fahrenheit", k: "Kelvin" };
        document.getElementById("temp-form").addEventListener("submit", event => {
            event.preventDefault();
            const input = Number(document.getElementById("inputValue").value);
            const from = document.getElementById("fromUnit").value;
            const to = document.getElementById("toUnit").value;
            const celsius = toCelsius(input, from);
            const converted = Number(fromCelsius(celsius, to).toFixed(2));
            document.getElementById("value").textContent = `${input.toLocaleString()} ${labels[from]} = ${converted.toLocaleString()} ${labels[to]}`;
            document.getElementById("result").classList.add("active");
        });
    </script>
</body>
</html>
