ault();const loan=parseFloat(document.getElementById('loan').value);const rate=parseFloat(document.getElementById('rate').value)/100/12;const term=parseInt(document.getElementById('term').value)*12;const payment=loan*rate*Math.pow(1+rate,term)/(Math.pow(1+rate,term)-1);const total=payment*term;const interest=total-loan;document.getElementById('payment').textContent='$'+Math.round(payment).toLocaleString();document.getElementById('interest').textContent='$'+Math.round(interest).toLocaleString();document.getElementById('results').classList.add('active')})</script></body></html>
