<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Calculator | Zaculators</title>
    <style>
        :root { --primary:#2563eb; --bg:#f8fafc; --text:#0f172a; --border:#e2e8f0; --success:#16a34a; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
        header, footer { background:#fff; text-align:center; padding:1.5rem; }
        header { border-bottom:1px solid var(--border); }
        footer { border-top:1px solid var(--border); color:#64748b; margin-top:3rem; }
        main { max-width:920px; margin:0 auto; padding:2rem; }
        .panel,.disclaimer { background:#fff; border:1px solid var(--border); border-radius:12px; padding:2rem; }
        .disclaimer { margin-top:2rem; color:#7f1d1d; background:#fee2e2; border-color:#fecaca; }
        .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; }
        .full { grid-column:1 / -1; }
        label { display:block; font-weight:600; margin-bottom:0.5rem; }
        input, select, button { width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:8px; font:inherit; }
        button { background:var(--primary); border:none; color:#fff; font-weight:600; cursor:pointer; }
        .result { display:none; margin-top:1.5rem; padding:1.25rem; background:#f0fdf4; border-left:4px solid var(--success); border-radius:8px; }
        .result.active { display:block; }
        .value { font-size:1.5rem; font-weight:700; color:var(--success); margin-bottom:0.4rem; }
        .subtle { color:#64748b; }
        a { color:var(--primary); text-decoration:none; }
        @media (max-width:680px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>Nutrition Calculator</h1>
        <p class="subtle"><a href="index.html">Zaculators</a> / Health &amp; Fitness</p>
    </header>
    <main>
        <section class="panel">
            <form id="form" class="grid">
                <div><label for="calories">Daily Calories</label><input id="calories" type="number" min="1" step="1" placeholder="2200" required></div>
                <div>
                    <label for="goal">Goal</label>
                    <select id="goal">
                        <option value="balanced">Balanced</option>
                        <option value="highProtein">High protein</option>
                        <option value="lowerCarb">Lower carb</option>
                    </select>
                </div>
                <div class="full"><button type="submit">Estimate Macros</button></div>
            </form>
            <div id="result" class="result">
                <div id="value" class="value"></div>
                <p id="detail" class="subtle"></p>
            </div>
        </section>
        <div class="disclaimer">Macro splits are simplified guidelines and may not fit medical or performance needs.</div>
    </main>
    <footer><p><strong>Zaculators</strong> &copy; 2026</p></footer>
    <script>
        document.getElementById("form").addEventListener("submit", event => {
            event.preventDefault();
            const calories = Number(document.getElementById("calories").value);
            const goal = document.getElementById("goal").value;
            let proteinPct = 0.25, carbPct = 0.45, fatPct = 0.30;
            if (goal === "highProtein") { proteinPct = 0.35; carbPct = 0.35; fatPct = 0.30; }
            if (goal === "lowerCarb") { proteinPct = 0.30; carbPct = 0.25; fatPct = 0.45; }
            const protein = Math.round((calories * proteinPct) / 4);
            const carbs = Math.round((calories * carbPct) / 4);
            const fat = Math.round((calories * fatPct) / 9);
            document.getElementById("value").textContent = `${protein}g protein / ${carbs}g carbs / ${fat}g fat`;
            document.getElementById("detail").textContent = `Based on ${calories.toLocaleString()} calories and a ${goal} split.`;
            document.getElementById("result").classList.add("active");
        });
    </script>
</body>
</html>
