<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Worth Calculator | Zaculators</title>
    <style>
        :root { --primary:#2563eb; --bg:#f8fafc; --text:#0f172a; --border:#e2e8f0; --success:#16a34a; --danger:#dc2626; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
        header, footer { background:#fff; text-align:center; padding:1.5rem; }
        header { border-bottom:1px solid var(--border); }
        footer { border-top:1px solid var(--border); color:#64748b; margin-top:3rem; }
        main { max-width:920px; margin:0 auto; padding:2rem; }
        .panel { background:#fff; border:1px solid var(--border); border-radius:12px; padding:2rem; }
        .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; }
        .full { grid-column:1 / -1; }
        label { display:block; font-weight:600; margin-bottom:0.5rem; }
        input, button { width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:8px; font:inherit; }
        button { background:var(--primary); border:none; color:#fff; font-weight:600; cursor:pointer; }
        .result { display:none; margin-top:1.5rem; padding:1.25rem; background:#f8fafc; border:1px solid var(--border); border-radius:8px; }
        .result.active { display:block; }
        .value { font-size:1.55rem; font-weight:700; margin-bottom:0.5rem; }
        h1 { font-size:1.8rem; margin-bottom:0.25rem; }
        .subtle { color:#64748b; }
        .good { color:var(--success); }
        .bad { color:var(--danger); }
        a { color:var(--primary); text-decoration:none; }
        a:hover { text-decoration:underline; }
        @media (max-width:680px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>Net Worth Calculator</h1>
        <p class="subtle"><a href="index.html">Zaculators</a> / Financial &amp; Planning</p>
    </header>
    <main>
        <section class="panel">
            <form id="form" class="grid">
                <div><label for="cash">Cash and Savings</label><input id="cash" type="number" min="0" step="0.01" placeholder="10000" required></div>
                <div><label for="investments">Investments</label><input id="investments" type="number" min="0" step="0.01" placeholder="25000" required></div>
                <div><label for="property">Property Value</label><input id="property" type="number" min="0" step="0.01" placeholder="200000" required></div>
                <div><label for="otherAssets">Other Assets</label><input id="otherAssets" type="number" min="0" step="0.01" placeholder="5000" required></div>
                <div><label for="loans">Loans</label><input id="loans" type="number" min="0" step="0.01" placeholder="15000" required></div>
                <div><label for="mortgage">Mortgage</label><input id="mortgage" type="number" min="0" step="0.01" placeholder="160000" required></div>
                <div class="full"><button type="submit">Calculate Net Worth</button></div>
            </form>
            <div id="result" class="result">
                <div id="value" class="value"></div>
                <p id="detail" class="subtle"></p>
            </div>
        </section>
    </main>
    <footer><p><strong>Zaculators</strong> &copy; 2026</p></footer>
    <script>
        const money = value => value.toLocaleString(undefined, { style: "currency", currency: "USD" });
        document.getElementById("form").addEventListener("submit", event => {
            event.preventDefault();
            const assets = ["cash", "investments", "property", "otherAssets"].reduce((sum, id) => sum + Number(document.getElementById(id).value), 0);
            const liabilities = ["loans", "mortgage"].reduce((sum, id) => sum + Number(document.getElementById(id).value), 0);
            const worth = assets - liabilities;
            const value = document.getElementById("value");
            value.textContent = money(worth);
            value.className = `value ${worth >= 0 ? "good" : "bad"}`;
            document.getElementById("detail").textContent = `${money(assets)} in assets minus ${money(liabilities)} in liabilities.`;
            document.getElementById("result").classList.add("active");
        });
    </script>
</body>
</html>
