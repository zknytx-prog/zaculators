<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Planner Budget | Zaculators</title>
    <style>
        :root { --primary:#2563eb; --bg:#f8fafc; --text:#0f172a; --border:#e2e8f0; --success:#16a34a; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
        header, footer { background:#fff; text-align:center; padding:1.5rem; }
        header { border-bottom:1px solid var(--border); }
        footer { border-top:1px solid var(--border); color:#64748b; margin-top:3rem; }
        main { max-width:920px; margin:0 auto; padding:2rem; }
        .panel { background:#fff; border:1px solid var(--border); border-radius:12px; padding:2rem; }
        .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; }
        .full { grid-column:1 / -1; }
        label { display:block; font-weight:600; margin-bottom:0.5rem; }
        input, button { width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:8px; font:inherit; }
        button { background:var(--primary); border:none; color:#fff; font-weight:600; cursor:pointer; }
        h1 { font-size:1.8rem; margin-bottom:0.25rem; }
        .subtle { color:#64748b; }
        .result { display:none; margin-top:1.5rem; padding:1.25rem; border-left:4px solid var(--success); background:#f0fdf4; border-radius:8px; }
        .result.active { display:block; }
        .value { font-size:1.6rem; font-weight:700; color:var(--success); margin-bottom:0.5rem; }
        a { color:var(--primary); text-decoration:none; }
        a:hover { text-decoration:underline; }
        @media (max-width:680px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>Event Planner Budget</h1>
        <p class="subtle"><a href="index.html">Zaculators</a> / Utilities &amp; Converters</p>
    </header>
    <main>
        <section class="panel">
            <form id="event-form" class="grid">
                <div><label for="guests">Guests</label><input type="number" id="guests" min="1" step="1" placeholder="80" required></div>
                <div><label for="foodPerGuest">Food per Guest</label><input type="number" id="foodPerGuest" min="0" step="0.01" placeholder="28" required></div>
                <div><label for="venue">Venue</label><input type="number" id="venue" min="0" step="0.01" placeholder="1200" required></div>
                <div><label for="decor">Decor</label><input type="number" id="decor" min="0" step="0.01" placeholder="300" required></div>
                <div class="full"><label for="other">Other Costs</label><input type="number" id="other" min="0" step="0.01" placeholder="250" required></div>
                <div class="full"><button type="submit">Estimate Event Budget</button></div>
            </form>
            <div id="result" class="result">
                <div id="value" class="value"></div>
                <p id="detail" class="subtle"></p>
            </div>
        </section>
    </main>
    <footer><p><strong>Zaculators</strong> &copy; 2026</p></footer>
    <script>
        function formatCurrency(value) {
            return value.toLocaleString(undefined, { style: "currency", currency: "USD" });
        }
        document.getElementById("event-form").addEventListener("submit", event => {
            event.preventDefault();
            const guests = Number(document.getElementById("guests").value);
            const foodPerGuest = Number(document.getElementById("foodPerGuest").value);
            const venue = Number(document.getElementById("venue").value);
            const decor = Number(document.getElementById("decor").value);
            const other = Number(document.getElementById("other").value);
            const total = (guests * foodPerGuest) + venue + decor + other;
            document.getElementById("value").textContent = formatCurrency(total);
            document.getElementById("detail").textContent = `${formatCurrency(total / guests)} per guest based on current inputs.`;
            document.getElementById("result").classList.add("active");
        });
    </script>
</body>
</html>
