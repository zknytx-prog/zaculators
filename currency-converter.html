<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter | Zaculators</title>
    <style>
        :root { --primary:#2563eb; --bg:#f8fafc; --text:#0f172a; --border:#e2e8f0; --success:#16a34a; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
        header, footer { background:#fff; text-align:center; padding:1.5rem; }
        header { border-bottom:1px solid var(--border); }
        footer { border-top:1px solid var(--border); color:#64748b; margin-top:3rem; }
        main { max-width:920px; margin:0 auto; padding:2rem; }
        .panel { background:#fff; border:1px solid var(--border); border-radius:12px; padding:2rem; margin-bottom:2rem; }
        .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; }
        .full { grid-column:1 / -1; }
        label { display:block; font-weight:600; margin-bottom:0.5rem; }
        input, select, button { width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:8px; font:inherit; }
        input:focus, select:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
        button { background:var(--primary); border:none; color:#fff; font-weight:600; cursor:pointer; }
        h1 { font-size:1.8rem; margin-bottom:0.25rem; }
        h2 { color:var(--primary); margin-bottom:1rem; }
        .subtle { color:#64748b; }
        .result { display:none; margin-top:1.5rem; padding:1.25rem; border-left:4px solid var(--success); background:#f0fdf4; border-radius:8px; }
        .result.active { display:block; }
        .value { font-size:1.6rem; font-weight:700; color:var(--success); }
        a { color:var(--primary); text-decoration:none; }
        a:hover { text-decoration:underline; }
        @media (max-width:680px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>Currency Converter</h1>
        <p class="subtle"><a href="index.html">Zaculators</a> / Utilities &amp; Converters</p>
    </header>
    <main>
        <section class="panel">
            <h2>Convert Currency</h2>
            <form id="currency-form" class="grid">
                <div class="full">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" min="0" step="0.01" placeholder="100" required>
                </div>
                <div>
                    <label for="from">From</label>
                    <select id="from"></select>
                </div>
                <div>
                    <label for="to">To</label>
                    <select id="to"></select>
                </div>
                <div class="full">
                    <button type="submit">Convert</button>
                </div>
            </form>
            <div id="result" class="result">
                <div id="value" class="value"></div>
                <p id="detail" class="subtle" style="margin-top:0.5rem;"></p>
            </div>
        </section>
        <section class="panel">
            <p class="subtle">Currency display can be changed, but rates, taxes, and rules may still be country-specific.</p>
        </section>
    </main>
    <footer><p><strong>Zaculators</strong> &copy; 2026</p></footer>
    <script src="currency-preferences.js"></script>
    <script>
        const rates = {
            USD: 1,
            EUR: 0.92,
            GBP: 0.79,
            CAD: 1.37,
            JPY: 155.4
        };
        const from = document.getElementById("from");
        const to = document.getElementById("to");
        function formatForCode(amount, code) {
            const currencyMap = {
                USD: { symbol: "$", prefixSpace: false },
                EUR: { symbol: "€", prefixSpace: false },
                GBP: { symbol: "£", prefixSpace: false },
                CAD: { symbol: "C$", prefixSpace: false },
                JPY: { symbol: "¥", prefixSpace: false }
            };
            const currency = currencyMap[code] || { symbol: code, prefixSpace: true };
            const formattedNumber = Number(amount).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            return currency.prefixSpace ? `${currency.symbol} ${formattedNumber}` : `${currency.symbol}${formattedNumber}`;
        }
        Object.keys(rates).forEach((code, index) => {
            from.add(new Option(code, code));
            to.add(new Option(code, code));
            if (index === 1) to.value = code;
        });
        if (rates[getCurrencyCode()]) {
            to.value = getCurrencyCode();
        }
        initializeCurrencySelector();
        document.getElementById("currency-form").addEventListener("submit", event => {
            event.preventDefault();
            const amount = Number(document.getElementById("amount").value);
            const usdValue = amount / rates[from.value];
            const converted = usdValue * rates[to.value];
            const rounded = Number(converted.toFixed(2));
            document.getElementById("value").textContent = `${formatForCode(rounded, to.value)} (${to.value})`;
            document.getElementById("detail").textContent = `${formatForCode(amount, from.value)} (${from.value}) = ${formatForCode(rounded, to.value)} (${to.value}). Preferred display: ${getCurrencyCode()}.`;
            document.getElementById("result").classList.add("active");
        });
        document.addEventListener("zaculators:currencychange", () => {
            if (rates[getCurrencyCode()]) {
                to.value = getCurrencyCode();
            }
        });
    </script>
</body>
</html>
