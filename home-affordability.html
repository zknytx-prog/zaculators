<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Affordability Calculator | Zaculators</title>
    <style>
        :root { --primary:#2563eb; --bg:#f8fafc; --text:#0f172a; --border:#e2e8f0; --success:#16a34a; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
        header, footer { background:#fff; text-align:center; padding:1.5rem; }
        header { border-bottom:1px solid var(--border); }
        footer { border-top:1px solid var(--border); color:#64748b; margin-top:3rem; }
        main { max-width:920px; margin:0 auto; padding:2rem; }
        .panel { background:#fff; border:1px solid var(--border); border-radius:12px; padding:2rem; }
        .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; }
        .full { grid-column:1 / -1; }
        label { display:block; font-weight:600; margin-bottom:0.5rem; }
        input, button { width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:8px; font:inherit; }
        button { background:var(--primary); border:none; color:#fff; font-weight:600; cursor:pointer; }
        .result { display:none; margin-top:1.5rem; padding:1.25rem; background:#f0fdf4; border-left:4px solid var(--success); border-radius:8px; }
        .result.active { display:block; }
        .value { font-size:1.5rem; font-weight:700; color:var(--success); margin-bottom:0.5rem; }
        .subtle { color:#64748b; }
        a { color:var(--primary); text-decoration:none; }
        a:hover { text-decoration:underline; }
        @media (max-width:680px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>Home Affordability Calculator</h1>
        <p class="subtle"><a href="index.html">Zaculators</a> / Real Estate</p>
    </header>
    <main>
        <section class="panel">
            <form id="form" class="grid">
                <div><label for="income">Annual Household Income</label><input id="income" type="number" min="0" step="0.01" placeholder="95000" required></div>
                <div><label for="debts">Monthly Debt Payments</label><input id="debts" type="number" min="0" step="0.01" placeholder="600" required></div>
                <div><label for="down">Available Down Payment</label><input id="down" type="number" min="0" step="0.01" placeholder="50000" required></div>
                <div><label for="rate">Mortgage Rate (%)</label><input id="rate" type="number" min="0" step="0.01" placeholder="6.5" required></div>
                <div class="full"><button type="submit">Estimate Affordable Home Price</button></div>
            </form>
            <div id="result" class="result">
                <div id="value" class="value"></div>
                <p id="detail" class="subtle"></p>
            </div>
        </section>
    </main>
    <footer><p><strong>Zaculators</strong> &copy; 2026</p></footer>
    <script>
        const money = value => value.toLocaleString(undefined, { style: "currency", currency: "USD" });
        document.getElementById("form").addEventListener("submit", event => {
            event.preventDefault();
            const income = Number(document.getElementById("income").value) / 12;
            const debts = Number(document.getElementById("debts").value);
            const down = Number(document.getElementById("down").value);
            const monthlyBudget = Math.max((income * 0.28) - debts, 0);
            const monthlyRate = Number(document.getElementById("rate").value) / 100 / 12;
            const months = 30 * 12;
            const loanAmount = monthlyRate === 0
                ? monthlyBudget * months
                : monthlyBudget * ((((1 + monthlyRate) ** months) - 1) / (monthlyRate * (1 + monthlyRate) ** months));
            const price = loanAmount + down;
            document.getElementById("value").textContent = money(price);
            document.getElementById("detail").textContent = `${money(monthlyBudget)} estimated monthly housing budget before taxes and insurance.`;
            document.getElementById("result").classList.add("active");
        });
    </script>
</body>
</html>
