<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIIT Timer | Zaculators</title>
    <style>
        :root { --primary:#2563eb; --bg:#f8fafc; --text:#0f172a; --border:#e2e8f0; --success:#16a34a; --warning:#f59e0b; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
        header, footer { background:#fff; text-align:center; padding:1.5rem; }
        header { border-bottom:1px solid var(--border); }
        footer { border-top:1px solid var(--border); color:#64748b; margin-top:3rem; }
        main { max-width:920px; margin:0 auto; padding:2rem; }
        .panel,.disclaimer { background:#fff; border:1px solid var(--border); border-radius:12px; padding:2rem; }
        .disclaimer { margin-top:2rem; color:#7f1d1d; background:#fee2e2; border-color:#fecaca; }
        .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; }
        .full { grid-column:1 / -1; }
        label { display:block; font-weight:600; margin-bottom:0.5rem; }
        input, button { width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:8px; font:inherit; }
        button { border:none; color:#fff; font-weight:600; cursor:pointer; }
        .primary { background:var(--primary); }
        .secondary { background:var(--warning); }
        .result { margin-top:1.5rem; padding:1.5rem; background:#f8fafc; border:1px solid var(--border); border-radius:8px; text-align:center; }
        .value { font-size:2rem; font-weight:700; color:var(--success); margin-bottom:0.4rem; }
        .subtle { color:#64748b; }
        a { color:var(--primary); text-decoration:none; }
        @media (max-width:680px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>HIIT Timer</h1>
        <p class="subtle"><a href="index.html">Zaculators</a> / Health &amp; Fitness</p>
    </header>
    <main>
        <section class="panel">
            <div class="grid">
                <div><label for="work">Work Seconds</label><input id="work" type="number" min="1" step="1" value="30"></div>
                <div><label for="rest">Rest Seconds</label><input id="rest" type="number" min="1" step="1" value="15"></div>
                <div><label for="rounds">Rounds</label><input id="rounds" type="number" min="1" step="1" value="8"></div>
                <div class="full"><button id="start" class="primary">Start Timer</button></div>
                <div class="full"><button id="reset" class="secondary" type="button">Reset</button></div>
            </div>
            <div class="result">
                <div id="phase" class="subtle">Ready</div>
                <div id="value" class="value">00:00</div>
                <p id="detail" class="subtle">Round 0 of 0</p>
            </div>
        </section>
        <div class="disclaimer">Use exercise timers responsibly and adjust intervals to your fitness level.</div>
    </main>
    <footer><p><strong>Zaculators</strong> &copy; 2026</p></footer>
    <script>
        let interval = null;
        let remaining = 0;
        let totalRounds = 0;
        let round = 0;
        let isWork = true;
        function render() {
            const mins = String(Math.floor(remaining / 60)).padStart(2, "0");
            const secs = String(remaining % 60).padStart(2, "0");
            document.getElementById("value").textContent = `${mins}:${secs}`;
            document.getElementById("phase").textContent = isWork ? "Work" : "Rest";
            document.getElementById("detail").textContent = `Round ${round} of ${totalRounds}`;
        }
        function stopTimer() {
            clearInterval(interval);
            interval = null;
        }
        document.getElementById("start").addEventListener("click", () => {
            stopTimer();
            const work = Number(document.getElementById("work").value);
            const rest = Number(document.getElementById("rest").value);
            totalRounds = Number(document.getElementById("rounds").value);
            round = 1;
            isWork = true;
            remaining = work;
            render();
            interval = setInterval(() => {
                remaining -= 1;
                if (remaining < 0) {
                    if (isWork) {
                        isWork = false;
                        remaining = rest;
                    } else if (round < totalRounds) {
                        round += 1;
                        isWork = true;
                        remaining = work;
                    } else {
                        stopTimer();
                        document.getElementById("phase").textContent = "Complete";
                        document.getElementById("detail").textContent = `${totalRounds} rounds finished`;
                        document.getElementById("value").textContent = "00:00";
                        return;
                    }
                }
                render();
            }, 1000);
        });
        document.getElementById("reset").addEventListener("click", () => {
            stopTimer();
            remaining = 0;
            round = 0;
            totalRounds = 0;
            isWork = true;
            document.getElementById("phase").textContent = "Ready";
            document.getElementById("detail").textContent = "Round 0 of 0";
            document.getElementById("value").textContent = "00:00";
        });
    </script>
</body>
</html>
