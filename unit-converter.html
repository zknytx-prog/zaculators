<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter | Zaculators</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #0f172a;
            --border: #e2e8f0;
            --success: #16a34a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        header, footer {
            background: #fff;
            text-align: center;
            padding: 1.5rem;
        }
        header { border-bottom: 1px solid var(--border); }
        footer {
            border-top: 1px solid var(--border);
            color: #64748b;
            margin-top: 3rem;
        }
        main {
            max-width: 920px;
            margin: 0 auto;
            padding: 2rem;
        }
        .panel {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
        h2 { color: var(--primary); margin-bottom: 1rem; }
        .subtle { color: #64748b; }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }
        .full { grid-column: 1 / -1; }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        input, select, button {
            width: 100%;
            padding: 0.85rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            font: inherit;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        button {
            background: var(--primary);
            border: none;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }
        .result {
            display: none;
            margin-top: 1.5rem;
            padding: 1.25rem;
            border-left: 4px solid var(--success);
            background: #f0fdf4;
            border-radius: 8px;
        }
        .result.active { display: block; }
        .value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--success);
        }
        .hint-list {
            display: grid;
            gap: 0.75rem;
            color: #475569;
            font-size: 0.95rem;
        }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }
        @media (max-width: 680px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Unit Converter</h1>
        <p class="subtle"><a href="index.html">Zaculators</a> / Utilities &amp; Converters</p>
    </header>

    <main>
        <section class="panel">
            <h2>Convert Units</h2>
            <form id="converter-form" class="grid">
                <div class="full">
                    <label for="category">Conversion Type</label>
                    <select id="category">
                        <option value="length">Length</option>
                        <option value="weight">Weight</option>
                        <option value="temperature">Temperature</option>
                    </select>
                </div>
                <div>
                    <label for="fromUnit">From</label>
                    <select id="fromUnit"></select>
                </div>
                <div>
                    <label for="toUnit">To</label>
                    <select id="toUnit"></select>
                </div>
                <div class="full">
                    <label for="inputValue">Value</label>
                    <input type="number" id="inputValue" step="any" min="0" placeholder="Enter a number" required>
                </div>
                <div class="full">
                    <button type="submit">Convert</button>
                </div>
            </form>
            <div id="result" class="result">
                <div class="value" id="resultValue"></div>
                <p class="subtle" id="resultDetail" style="margin-top:0.5rem;"></p>
            </div>
        </section>

        <section class="panel">
            <h2>Included Unit Sets</h2>
            <div class="hint-list">
                <p>Length: meters, kilometers, miles, feet.</p>
                <p>Weight: kilograms, grams, pounds, ounces.</p>
                <p>Temperature: Celsius, Fahrenheit, Kelvin.</p>
            </div>
        </section>
    </main>

    <footer>
        <p><strong>Zaculators</strong> &copy; 2026</p>
    </footer>

    <script>
        const unitMap = {
            length: {
                meter: { label: "Meters", toBase: value => value, fromBase: value => value },
                kilometer: { label: "Kilometers", toBase: value => value * 1000, fromBase: value => value / 1000 },
                mile: { label: "Miles", toBase: value => value * 1609.344, fromBase: value => value / 1609.344 },
                foot: { label: "Feet", toBase: value => value * 0.3048, fromBase: value => value / 0.3048 }
            },
            weight: {
                kilogram: { label: "Kilograms", toBase: value => value, fromBase: value => value },
                gram: { label: "Grams", toBase: value => value / 1000, fromBase: value => value * 1000 },
                pound: { label: "Pounds", toBase: value => value * 0.45359237, fromBase: value => value / 0.45359237 },
                ounce: { label: "Ounces", toBase: value => value * 0.028349523125, fromBase: value => value / 0.028349523125 }
            },
            temperature: {
                celsius: { label: "Celsius", toBase: value => value, fromBase: value => value },
                fahrenheit: { label: "Fahrenheit", toBase: value => (value - 32) * 5 / 9, fromBase: value => (value * 9 / 5) + 32 },
                kelvin: { label: "Kelvin", toBase: value => value - 273.15, fromBase: value => value + 273.15 }
            }
        };

        const category = document.getElementById("category");
        const fromUnit = document.getElementById("fromUnit");
        const toUnit = document.getElementById("toUnit");
        const form = document.getElementById("converter-form");
        const result = document.getElementById("result");
        const resultValue = document.getElementById("resultValue");
        const resultDetail = document.getElementById("resultDetail");

        function populateUnits() {
            const units = unitMap[category.value];
            const entries = Object.entries(units);
            fromUnit.innerHTML = "";
            toUnit.innerHTML = "";

            entries.forEach(([key, config], index) => {
                const fromOption = new Option(config.label, key);
                const toOption = new Option(config.label, key);
                fromUnit.add(fromOption);
                toUnit.add(toOption);
                if (index === 1) {
                    toUnit.value = key;
                }
            });
        }

        category.addEventListener("change", populateUnits);
        form.addEventListener("submit", event => {
            event.preventDefault();

            const rawValue = Number(document.getElementById("inputValue").value);
            const units = unitMap[category.value];
            const fromConfig = units[fromUnit.value];
            const toConfig = units[toUnit.value];

            const baseValue = fromConfig.toBase(rawValue);
            const converted = toConfig.fromBase(baseValue);
            const rounded = Number(converted.toFixed(6));

            resultValue.textContent = rounded.toLocaleString();
            resultDetail.textContent = `${rawValue.toLocaleString()} ${fromConfig.label} = ${rounded.toLocaleString()} ${toConfig.label}`;
            result.classList.add("active");
        });

        populateUnits();
    </script>
</body>
</html>
