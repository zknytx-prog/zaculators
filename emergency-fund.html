<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Fund Calculator | Zaculators</title>
    <style>
        :root { --primary:#2563eb; --bg:#f8fafc; --text:#0f172a; --border:#e2e8f0; --success:#16a34a; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
        header, footer { background:#fff; text-align:center; padding:1.5rem; }
        header { border-bottom:1px solid var(--border); }
        footer { border-top:1px solid var(--border); color:#64748b; margin-top:3rem; }
        main { max-width:920px; margin:0 auto; padding:2rem; }
        .panel { background:#fff; border:1px solid var(--border); border-radius:12px; padding:2rem; }
        .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; }
        .full { grid-column:1 / -1; }
        label { display:block; font-weight:600; margin-bottom:0.5rem; }
        input, button { width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:8px; font:inherit; }
        button { background:var(--primary); border:none; color:#fff; font-weight:600; cursor:pointer; }
        .result { display:none; margin-top:1.5rem; padding:1.25rem; background:#f0fdf4; border-left:4px solid var(--success); border-radius:8px; }
        .result.active { display:block; }
        .value { font-size:1.5rem; font-weight:700; color:var(--success); margin-bottom:0.5rem; }
        .subtle { color:#64748b; }
        a { color:var(--primary); text-decoration:none; }
        a:hover { text-decoration:underline; }
        @media (max-width:680px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>Emergency Fund Calculator</h1>
        <p class="subtle"><a href="index.html">Zaculators</a> / Financial &amp; Planning</p>
    </header>
    <main>
        <section class="panel">
            <form id="form" class="grid">
                <div><label for="expenses">Monthly Essential Expenses</label><input id="expenses" type="number" min="0" step="0.01" placeholder="3200" required></div>
                <div><label for="months">Coverage Months</label><input id="months" type="number" min="1" step="1" placeholder="6" required></div>
                <div><label for="saved">Already Saved</label><input id="saved" type="number" min="0" step="0.01" placeholder="5000" required></div>
                <div><label for="monthlySave">Monthly Savings Amount</label><input id="monthlySave" type="number" min="0.01" step="0.01" placeholder="400" required></div>
                <div class="full"><button type="submit">Calculate Target</button></div>
            </form>
            <div id="result" class="result">
                <div id="value" class="value"></div>
                <p id="detail" class="subtle"></p>
            </div>
        </section>
    </main>
    <footer><p><strong>Zaculators</strong> &copy; 2026</p></footer>
    <script>
        const money = value => value.toLocaleString(undefined, { style: "currency", currency: "USD" });
        document.getElementById("form").addEventListener("submit", event => {
            event.preventDefault();
            const expenses = Number(document.getElementById("expenses").value);
            const months = Number(document.getElementById("months").value);
            const saved = Number(document.getElementById("saved").value);
            const monthlySave = Number(document.getElementById("monthlySave").value);
            const target = expenses * months;
            const gap = Math.max(target - saved, 0);
            const time = gap === 0 ? 0 : Math.ceil(gap / monthlySave);
            document.getElementById("value").textContent = money(target);
            document.getElementById("detail").textContent = gap === 0
                ? "Your emergency fund target is already covered."
                : `${money(gap)} remaining, about ${time} months at your current savings pace.`;
            document.getElementById("result").classList.add("active");
        });
    </script>
</body>
</html>
