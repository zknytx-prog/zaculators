<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Converter | Zaculators</title>
    <style>
        :root { --primary:#2563eb; --bg:#f8fafc; --text:#0f172a; --border:#e2e8f0; --success:#16a34a; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
        header, footer { background:#fff; text-align:center; padding:1.5rem; }
        header { border-bottom:1px solid var(--border); }
        footer { border-top:1px solid var(--border); color:#64748b; margin-top:3rem; }
        main { max-width:920px; margin:0 auto; padding:2rem; }
        .panel { background:#fff; border:1px solid var(--border); border-radius:12px; padding:2rem; }
        .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; }
        .full { grid-column:1 / -1; }
        label { display:block; font-weight:600; margin-bottom:0.5rem; }
        input, select, button { width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:8px; font:inherit; }
        button { background:var(--primary); border:none; color:#fff; font-weight:600; cursor:pointer; }
        h1 { font-size:1.8rem; margin-bottom:0.25rem; }
        .subtle { color:#64748b; }
        .result { display:none; margin-top:1.5rem; padding:1.25rem; border-left:4px solid var(--success); background:#f0fdf4; border-radius:8px; }
        .result.active { display:block; }
        .value { font-size:1.6rem; font-weight:700; color:var(--success); }
        a { color:var(--primary); text-decoration:none; }
        a:hover { text-decoration:underline; }
        @media (max-width:680px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>Weight Converter</h1>
        <p class="subtle"><a href="index.html">Zaculators</a> / Utilities &amp; Converters</p>
    </header>
    <main>
        <section class="panel">
            <form id="weight-form" class="grid">
                <div class="full">
                    <label for="weight">Weight</label>
                    <input type="number" id="weight" min="0" step="any" placeholder="70" required>
                </div>
                <div>
                    <label for="from">From</label>
                    <select id="from"></select>
                </div>
                <div>
                    <label for="to">To</label>
                    <select id="to"></select>
                </div>
                <div class="full">
                    <button type="submit">Convert</button>
                </div>
            </form>
            <div id="result" class="result"><div id="value" class="value"></div></div>
        </section>
    </main>
    <footer><p><strong>Zaculators</strong> &copy; 2026</p></footer>
    <script>
        const units = {
            kilogram: { label: "Kilograms", factor: 1 },
            gram: { label: "Grams", factor: 0.001 },
            pound: { label: "Pounds", factor: 0.45359237 },
            ounce: { label: "Ounces", factor: 0.028349523125 }
        };
        const from = document.getElementById("from");
        const to = document.getElementById("to");
        Object.entries(units).forEach(([key, unit], index) => {
            from.add(new Option(unit.label, key));
            to.add(new Option(unit.label, key));
            if (index === 2) to.value = key;
        });
        document.getElementById("weight-form").addEventListener("submit", event => {
            event.preventDefault();
            const weight = Number(document.getElementById("weight").value);
            const kilos = weight * units[from.value].factor;
            const converted = Number((kilos / units[to.value].factor).toFixed(6));
            document.getElementById("value").textContent = `${weight.toLocaleString()} ${units[from.value].label} = ${converted.toLocaleString()} ${units[to.value].label}`;
            document.getElementById("result").classList.add("active");
        });
    </script>
</body>
</html>
