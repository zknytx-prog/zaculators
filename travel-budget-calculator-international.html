<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Budget Calculator International | Zaculators</title>
    <style>
        :root { --primary:#2563eb; --bg:#f8fafc; --text:#0f172a; --border:#e2e8f0; --success:#16a34a; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
        header, footer { background:#fff; text-align:center; padding:1.5rem; }
        header { border-bottom:1px solid var(--border); }
        footer { border-top:1px solid var(--border); color:#64748b; margin-top:3rem; }
        main { max-width:920px; margin:0 auto; padding:2rem; }
        .panel,.disclaimer { background:#fff; border:1px solid var(--border); border-radius:12px; padding:2rem; }
        .disclaimer { margin-top:2rem; color:#7f1d1d; background:#fee2e2; border-color:#fecaca; }
        .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; }
        .full { grid-column:1 / -1; }
        label { display:block; font-weight:600; margin-bottom:0.5rem; }
        input, button { width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:8px; font:inherit; }
        button { background:var(--primary); border:none; color:#fff; font-weight:600; cursor:pointer; }
        .result { display:none; margin-top:1.5rem; padding:1.25rem; background:#f0fdf4; border-left:4px solid var(--success); border-radius:8px; }
        .result.active { display:block; }
        .value { font-size:1.5rem; font-weight:700; color:var(--success); margin-bottom:0.4rem; }
        .subtle { color:#64748b; }
        a { color:var(--primary); text-decoration:none; }
        @media (max-width:680px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>Travel Budget Calculator International</h1>
        <p class="subtle"><a href="index.html">Zaculators</a> / Tax &amp; International</p>
    </header>
    <main>
        <section class="panel">
            <form id="form" class="grid">
                <div><label for="flights">Flights</label><input id="flights" type="number" min="0" step="0.01" placeholder="950" required></div>
                <div><label for="lodging">Lodging Total</label><input id="lodging" type="number" min="0" step="0.01" placeholder="1200" required></div>
                <div><label for="food">Food Budget</label><input id="food" type="number" min="0" step="0.01" placeholder="400" required></div>
                <div><label for="localTransport">Local Transport</label><input id="localTransport" type="number" min="0" step="0.01" placeholder="180" required></div>
                <div><label for="activities">Activities</label><input id="activities" type="number" min="0" step="0.01" placeholder="350" required></div>
                <div><label for="buffer">Buffer / Misc.</label><input id="buffer" type="number" min="0" step="0.01" placeholder="200" required></div>
                <div class="full"><button type="submit">Estimate Travel Budget</button></div>
            </form>
            <div id="result" class="result">
                <div id="value" class="value"></div>
                <p id="detail" class="subtle"></p>
            </div>
        </section>
        <div class="disclaimer">Travel costs vary by season, exchange rate, destination taxes, and booking timing.</div>
        <div class="disclaimer">Currency display can be changed, but rates, taxes, and rules may still be country-specific.</div>
    </main>
    <footer><p><strong>Zaculators</strong> &copy; 2026</p></footer>
    <script src="currency-preferences.js"></script>
    <script>
        initializeCurrencySelector();
        document.getElementById("form").addEventListener("submit", event => {
            event.preventDefault();
            const ids = ["flights", "lodging", "food", "localTransport", "activities", "buffer"];
            const total = ids.reduce((sum, id) => sum + Number(document.getElementById(id).value), 0);
            document.getElementById("value").textContent = `${formatCurrency(total)} (${getCurrencyCode()})`;
            document.getElementById("detail").textContent = "Estimated total international trip budget using your preferred display currency.";
            document.getElementById("result").classList.add("active");
        });
    </script>
</body>
</html>
