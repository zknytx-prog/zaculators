<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Cost Calculator | Zaculators</title>
    <style>
        :root { --primary:#2563eb; --bg:#f8fafc; --text:#0f172a; --border:#e2e8f0; --success:#16a34a; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
        header, footer { background:#fff; text-align:center; padding:1.5rem; }
        header { border-bottom:1px solid var(--border); }
        footer { border-top:1px solid var(--border); color:#64748b; margin-top:3rem; }
        main { max-width:920px; margin:0 auto; padding:2rem; }
        .panel { background:#fff; border:1px solid var(--border); border-radius:12px; padding:2rem; }
        .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; }
        .full { grid-column:1 / -1; }
        label { display:block; font-weight:600; margin-bottom:0.5rem; }
        input, button { width:100%; padding:0.85rem; border:1px solid var(--border); border-radius:8px; font:inherit; }
        button { background:var(--primary); border:none; color:#fff; font-weight:600; cursor:pointer; }
        h1 { font-size:1.8rem; margin-bottom:0.25rem; }
        .subtle { color:#64748b; }
        .result { display:none; margin-top:1.5rem; padding:1.25rem; border-left:4px solid var(--success); background:#f0fdf4; border-radius:8px; }
        .result.active { display:block; }
        .value { font-size:1.6rem; font-weight:700; color:var(--success); margin-bottom:0.5rem; }
        a { color:var(--primary); text-decoration:none; }
        a:hover { text-decoration:underline; }
        @media (max-width:680px) { .grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <header>
        <h1>Trip Cost Calculator</h1>
        <p class="subtle"><a href="index.html">Zaculators</a> / Utilities &amp; Converters</p>
    </header>
    <main>
        <section class="panel">
            <form id="trip-form" class="grid">
                <div><label for="distance">Distance</label><input type="number" id="distance" min="0" step="any" placeholder="300" required></div>
                <div><label for="mpg">Fuel Efficiency (MPG)</label><input type="number" id="mpg" min="0.1" step="any" placeholder="28" required></div>
                <div><label for="fuelPrice">Fuel Price per Gallon</label><input type="number" id="fuelPrice" min="0" step="0.01" placeholder="3.49" required></div>
                <div><label for="extraCosts">Tolls and Extra Costs</label><input type="number" id="extraCosts" min="0" step="0.01" placeholder="25" required></div>
                <div class="full"><button type="submit">Estimate Trip Cost</button></div>
            </form>
            <div id="result" class="result">
                <div id="value" class="value"></div>
                <p id="detail" class="subtle"></p>
            </div>
        </section>
    </main>
    <footer><p><strong>Zaculators</strong> &copy; 2026</p></footer>
    <script>
        function formatCurrency(value) {
            return value.toLocaleString(undefined, { style: "currency", currency: "USD" });
        }
        document.getElementById("trip-form").addEventListener("submit", event => {
            event.preventDefault();
            const distance = Number(document.getElementById("distance").value);
            const mpg = Number(document.getElementById("mpg").value);
            const fuelPrice = Number(document.getElementById("fuelPrice").value);
            const extraCosts = Number(document.getElementById("extraCosts").value);
            const gallons = distance / mpg;
            const fuelCost = gallons * fuelPrice;
            const totalCost = fuelCost + extraCosts;
            document.getElementById("value").textContent = formatCurrency(totalCost);
            document.getElementById("detail").textContent = `${gallons.toFixed(2)} gallons estimated, including ${formatCurrency(extraCosts)} in extra costs.`;
            document.getElementById("result").classList.add("active");
        });
    </script>
</body>
</html>
